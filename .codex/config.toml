#:schema https://developers.openai.com/codex/config-schema.json

notify = ["bash", "-lc", "afplay /System/Library/Sounds/Ping.aiff >/dev/null 2>&1 || true"]

[features]
codex_hooks = true

[mcp_servers.work-mcp]
command = "node"
args = ["./core/scripts/run-dex-mcp.cjs", "work_server.py"]
cwd = "."

[mcp_servers.work-mcp.env]
VAULT_PATH = "."

[mcp_servers.calendar-mcp]
command = "node"
args = ["./core/scripts/run-dex-mcp.cjs", "calendar_server.py"]
